<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">AWS architecture for the DerivaSys volatility surface dashboard</title>
  <desc id="desc">A cloud architecture diagram showing browser users, CloudFront and S3 static delivery, a websocket API boundary, runtime services, exchange market data, and observability.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#7f9fca" />
    </marker>
    <style>
      .bg { fill: #07101a; }
      .zone { fill: #09131f; stroke: #26364a; stroke-width: 1.5; }
      .box { fill: #0f1a2a; stroke: #33465f; stroke-width: 1.5; rx: 10; }
      .box-alt { fill: #111d2b; stroke: #735326; stroke-width: 1.5; rx: 10; }
      .box-good { fill: #0e1d19; stroke: #37694c; stroke-width: 1.5; rx: 10; }
      .label { fill: #e6edf7; font: 700 18px Inter, Arial, sans-serif; letter-spacing: .03em; }
      .small { fill: #a7b4c6; font: 500 13px Inter, Arial, sans-serif; }
      .tiny { fill: #7f8fa5; font: 600 11px Inter, Arial, sans-serif; letter-spacing: .08em; text-transform: uppercase; }
      .accent { fill: #d8903c; }
      .line { stroke: #7f9fca; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #57718f; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="560" />
  <rect class="zone" x="24" y="26" width="1072" height="508" rx="18" />
  <text class="tiny accent" x="48" y="58">AWS deployment shape</text>
  <text class="small" x="48" y="82">Static frontend delivery stays separate from live pricing, calibration, and websocket fanout.</text>

  <rect class="box" x="52" y="160" width="150" height="84" />
  <text class="label" x="78" y="192">Browser</text>
  <text class="small" x="78" y="216">dashboard users</text>

  <rect class="box-alt" x="270" y="126" width="180" height="72" />
  <text class="label" x="304" y="158">CloudFront</text>
  <text class="small" x="304" y="180">TLS, cache, redirects</text>

  <rect class="box" x="270" y="226" width="180" height="72" />
  <text class="label" x="316" y="258">S3</text>
  <text class="small" x="298" y="280">Vite static build</text>

  <rect class="box-alt" x="520" y="160" width="190" height="84" />
  <text class="label" x="552" y="192">WebSocket API</text>
  <text class="small" x="552" y="216">snapshots and patches</text>

  <rect class="zone" x="780" y="112" width="270" height="292" rx="14" />
  <text class="tiny accent" x="804" y="142">ECS or EKS services</text>

  <rect class="box" x="806" y="164" width="218" height="52" />
  <text class="label" x="830" y="196">Market connectors</text>

  <rect class="box" x="806" y="232" width="218" height="52" />
  <text class="label" x="842" y="264">Normalization</text>

  <rect class="box" x="806" y="300" width="218" height="52" />
  <text class="label" x="836" y="332">SVI calibration</text>

  <rect class="box-good" x="806" y="368" width="218" height="52" />
  <text class="label" x="846" y="400">Risk and fanout</text>

  <rect class="box" x="52" y="346" width="150" height="92" />
  <text class="label" x="84" y="380">Exchanges</text>
  <text class="small" x="80" y="404">Deribit, OKX,</text>
  <text class="small" x="80" y="423">Binance, others</text>

  <rect class="box" x="270" y="374" width="180" height="74" />
  <text class="label" x="303" y="406">Secrets</text>
  <text class="small" x="294" y="428">SSM / Secrets Manager</text>

  <rect class="box" x="520" y="374" width="190" height="74" />
  <text class="label" x="552" y="406">Observability</text>
  <text class="small" x="552" y="428">CloudWatch, alarms</text>

  <path class="line" d="M202 202 H270" />
  <path class="line-soft" d="M360 198 V226" />
  <path class="line" d="M450 262 C490 262 488 202 520 202" />
  <path class="line" d="M710 202 H780" />
  <path class="line" d="M202 392 C232 392 238 332 270 332 C520 332 660 392 806 190" />
  <path class="line-soft" d="M915 216 V232" />
  <path class="line-soft" d="M915 284 V300" />
  <path class="line-soft" d="M915 352 V368" />
  <path class="line-soft" d="M806 394 C746 394 746 220 710 220" />
  <path class="line-soft" d="M806 394 C760 394 750 410 710 410" />

  <text class="tiny" x="224" y="188">HTTPS</text>
  <text class="tiny" x="474" y="244">static app</text>
  <text class="tiny" x="722" y="192">WSS</text>
  <text class="tiny" x="286" y="364">credentials stay server-side</text>
  <text class="tiny" x="238" y="324">market data</text>
  <text class="tiny" x="538" y="362">freshness, lag, fit health</text>
</svg>
